spring.application.name=SB_Data_JPA_Example

# ======== Database Configuration ========
spring.datasource.url=jdbc:mysql://localhost:3306/jpa_example_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ======== Hibernate Configuration ========
# Update the schema dynamically based on entities
spring.jpa.hibernate.ddl-auto=update

# Show the generated SQL queries in the console
spring.jpa.show-sql=true

# Format the SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
